spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hrm_db
    username: postgres
    password: "1234$"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: hrm
        jdbc:
          lob:
            non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
    default-schema: hrm
    create-schemas: true

jwt:
  secret: hrm-jwt-secret-key-for-local-development-2024-min32chars
  expiration: 86400000   # 24h in ms

gemini:
  api:
    key: ${GEMINI_API_KEY:AIzaSyD94z234iSj39Sd_-iyh-2AeCSeAzFD7uA}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.hrm: DEBUG
    org.flywaydb: INFO
