spring:
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
      password: "1234$"
      database: 0
  datasource:
    url: jdbc:postgresql://localhost:5432/hrm_db?reWriteBatchedInserts=true
    username: postgres
    password: "1234$"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: hrm
        jdbc:
          batch_size: 500
          batch_versioned_data: true
          lob:
            non_contextual_creation: true
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
    default-schema: hrm
    create-schemas: true

server:
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: hrm-jwt-secret-key-for-local-development-2024-min32chars
  expiration: 86400000   # 24h in ms
  refresh-expiration: 604800000 # 7 days in ms

gemini:
  api:
    key: ${GEMINI_API_KEY:AIzaSyAzu5F2ICze9ii7CsZxCBeMuOhOwSbCRfo}
    model: ${GEMINI_MODEL:gemini-3-flash}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    com.hrm: DEBUG
    org.flywaydb: INFO

app:
  cors:
    allowed-origins: "http://localhost:3000,http://127.0.0.1:3000,http://192.168.*.*:3000,http://10.*.*.*:3000,http://172.*.*.*:3000"
  attendance:
    import:
      chunk-size: 1000
      jdbc-multi-rows-per-statement: 1000
