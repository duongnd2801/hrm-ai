version: '3.8'

services:
  redis:
    image: redis:7
    container_name: hrm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass "1234$"
    restart: always

  redisinsight:
    image: redis/redisinsight:latest
    container_name: hrm-redisinsight
    ports:
      - "8001:5540"
    restart: always
    depends_on:
      - redis

volumes:
  redis_data:
